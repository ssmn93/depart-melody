          <h1>東武動物公園駅 3番線「東武動物公園のテーマ ストリングスver」</h1>
          <p>収録駅:東武動物公園駅3番線</p>
          <p>スピーカー:TOA三角型</p>
          <label><input type="checkbox" id="buttonon">ボタン音オフ</label>

    <script>
      const audio = document.getElementById("melody");
      const depart = document.getElementById("depart");
      const tojime = document.getElementById("tojime");
      const button = document.getElementById("button");
      const buttonon = document.getElementById("buttonon");
      const url = new URL(window.location.href);
      const params = url.searchParams;
      const buttonurl = params.get('button');

      let isPlaying = false;
      let departReachedThreshold = false;

      const THRESHOLD = 0.12;

      let audioContext = null;
      let analyser = null;
      let monitorId = null;

      let melodyBuffer = null;
      let departBuffer = null;
      let tojimeBuffer = null;

      let melodySource = null;
      let departSource = null;
      let tojimeSource = null;
      let tojimeGeneration = 0;

      const timeData = new Uint8Array(2048);

      let loadPromise = null;

      function prepareAudio() {
        if (!loadPromise) {
          loadPromise = (async () => {
            if (!audioContext) {
              audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }

            if (!melodyBuffer || !departBuffer || !tojimeBuffer) {
              const [melodyRes, departRes, tojimeRes] = await Promise.all([
                fetch(audio.src),
                fetch(depart.src),
                fetch(tojime.src)
              ]);

              const [melodyArr, departArr, tojimeArr] = await Promise.all([
                melodyRes.arrayBuffer(),
                departRes.arrayBuffer(),
                tojimeRes.arrayBuffer()
              ]);

              [melodyBuffer, departBuffer, tojimeBuffer] = await Promise.all([
                audioContext.decodeAudioData(melodyArr),
                audioContext.decodeAudioData(departArr),
                audioContext.decodeAudioData(tojimeArr)
              ]);
            }

            if (!analyser) {
              analyser = audioContext.createAnalyser();
              analyser.fftSize = 2048;
              analyser.connect(audioContext.destination);
            }
          })().catch((e) => {
            loadPromise = null;
            throw e;
          });
        }

        return loadPromise;
      }

      prepareAudio();

      async function initAudio() {
        await prepareAudio();

        if (audioContext.state === "suspended") {
          try {
            await audioContext.resume();
          } catch (e) {}
        }
      }

      function stopMelodySource() {
        try { if (melodySource) melodySource.stop(); } catch (e) {}
        melodySource = null;
      }

      function stopDepartSource() {
        try { if (departSource) departSource.stop(); } catch (e) {}
        departSource = null;
      }

      function stopTojimeSource() {
        tojimeGeneration++;
      
        try {
          if (tojimeSource) {
            tojimeSource.onended = null;
            tojimeSource.stop(0);
            tojimeSource.disconnect();
          }
        } catch (e) {}
      
        tojimeSource = null;
      }

      function stopMonitoring() {
        if (monitorId) cancelAnimationFrame(monitorId);
        monitorId = null;
      }

      function startMonitoring() {
        departReachedThreshold = false;

        const tick = () => {
          if (!isPlaying || !departSource) return;

          analyser.getByteTimeDomainData(timeData);

          let sum = 0;
          for (let i = 0; i < timeData.length; i++) {
            const v = (timeData[i] - 128) / 128;
            sum += v * v;
          }

          const rms = Math.sqrt(sum / timeData.length);

          if (rms >= THRESHOLD) {
            departReachedThreshold = true;
          }

          monitorId = requestAnimationFrame(tick);
        };

        stopMonitoring();
        tick();
      }

      function createSource(buffer) {
        const source = audioContext.createBufferSource();
        source.buffer = buffer;
        return source;
      }

      async function playTogether() {
        await initAudio();

        stopMelodySource();
        stopMonitoring();

        melodySource = createSource(melodyBuffer);
        departSource = createSource(departBuffer);

        melodySource.connect(audioContext.destination);
        departSource.connect(analyser);

        const startTime = audioContext.currentTime + 0.01;

        melodySource.start(startTime);
        departSource.start(startTime);

        isPlaying = true;
        startMonitoring();

        melodySource.onended = () => {
          if (isPlaying) {
            isPlaying = false;
            stopMonitoring();
            stopMelodySource();
          }
        };

        departSource.onended = () => {
          departSource = null;
        };
      }

      async function playTojime() {
        await initAudio();
      
        stopTojimeSource();
      
        const generation = tojimeGeneration;
      
        const source = createSource(tojimeBuffer);
        tojimeSource = source;
      
        source.connect(audioContext.destination);
      
        source.start();
      
        source.onended = () => {
          if (generation === tojimeGeneration && tojimeSource === source) {
            try {
              source.disconnect();
            } catch (e) {}
      
            tojimeSource = null;
          }
        };
      }

      // クリックイベント
      document.getElementById('onButton').addEventListener('click', async function() {
        if (buttonurl !== 'off' && !buttonon.checked) {
          button.currentTime = 0;
          try {
            await button.play();
          } catch (e) {}
        }

        if (!isPlaying) {
          await playTogether();
        }
      });

      document.getElementById('offButton').addEventListener('click', async function() {
        if (buttonurl !== 'off' && !buttonon.checked) {
          button.currentTime = 0;
          try {
            await button.play();
          } catch (e) {}
        }

        if (isPlaying) {
          isPlaying = false;
          stopMonitoring();
          stopMelodySource();

          if (!departReachedThreshold) {
            try {
              await stopTojimeSource();
              await playTojime();
              await stopDepartSource();
            } catch (e) {}
          }
        }
      });
    </script>
