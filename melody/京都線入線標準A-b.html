      <div class="arrange">
        <img id="approach" src="https://raw.githubusercontent.com/ssmn93/depart-melody/main/approach/千里丘_2番_到着前.gif" />
      </div>
    <audio id="announce" src="https://raw.githubusercontent.com/ssmn93/dokobell_melody/main/接近放送_千里丘2番.mp3"></audio>
    <audio id="melody" src="https://raw.githubusercontent.com/ssmn93/dokobell_melody/main/京都線入線標準A-b.mp3"></audio>
      
      <div class="arrange">
        <div class="content">
          <h1>「曲名不明(京都線入線標準A-b)」</h1>
          <p>収録駅:千里丘駅2番線</p>
        </div>
      </div>
      <script type="module">
        const announce = document.getElementById("announce");
        const audio = document.getElementById("melody");
        const approach = document.getElementById("approach");
      
        let isPlaying = false;
      
        const audioContext = new AudioContext();
      
        const response = await fetch(audio.src);
        const arrayBuffer = await response.arrayBuffer();
        const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
      
        let source = audioContext.createBufferSource();
        source.buffer = audioBuffer;
        source.loop = true;
        source.connect(audioContext.destination);

        // クリックイベント
        document.getElementById('approach').addEventListener('click', function() {
              if (!isPlaying) {
                let approaching = "https://raw.githubusercontent.com/ssmn93/depart-melody/main/approach/千里丘_2番_接近中.gif";
                if (approach.src != approaching) approach.src = approaching;
                announce.play();
              } else {
                isPlaying = false;
                approach.src = "https://raw.githubusercontent.com/ssmn93/depart-melody/main/approach/千里丘_2番_到着前.gif";
                
                source.stop(0);
                source = audioContext.createBufferSource();
                source.buffer = audioBuffer;
                source.loop = true;
                source.connect(audioContext.destination);
              }
        });

        announce.addEventListener('ended', () => {
          if (!isPlaying) {
            if (audioContext.state === "suspended") {
              await audioContext.resume();
            }
            announce.currentTime = 0;
            isPlaying = true;
            audio.loop = true;
            source.start(0);
          }
        });
    </script>
